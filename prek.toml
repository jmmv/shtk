[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "check-executables-have-shebangs"

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "check-shebang-scripts-are-executable"
exclude = "^(bootstrap.subr|shtk.sh|unittest_inttest.sh)$"

[[repos.hooks]]
id = "detect-private-key"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "do-not-submit"
name = "Check for [D]O NOT SUBMIT markers"
language = "system"
entry = "sh"
args = ["-c", '! grep -rn "[D]O NOT SUBMIT" --exclude-dir=.git --exclude-dir=target .']
pass_filenames = false
always_run = true
